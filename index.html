<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Boucle — générateur de parcours</title>

<!-- PWA : installable sur l'écran d'accueil (manifest inline, pas de fichier séparé) -->
<meta name="theme-color" content="#101418">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boucle">
<link rel="manifest" href='data:application/manifest+json,{"name":"Boucle","short_name":"Boucle","display":"standalone","start_url":".","background_color":"%23101418","theme_color":"%23101418","icons":[{"src":"data:image/svg+xml,%253Csvg xmlns=%2527http://www.w3.org/2000/svg%2527 viewBox=%25270 0 100 100%2527%253E%253Crect width=%2527100%2527 height=%2527100%2527 rx=%252722%2527 fill=%2527%2523101418%2527/%253E%253Ccircle cx=%252750%2527 cy=%252750%2527 r=%252726%2527 fill=%2527none%2527 stroke=%2527%2523E8490F%2527 stroke-width=%252710%2527 stroke-dasharray=%2527120 44%2527 stroke-linecap=%2527round%2527/%253E%253C/svg%253E","sizes":"any","type":"image/svg+xml"}]}'>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23101418'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%23E8490F' stroke-width='10' stroke-dasharray='120 44' stroke-linecap='round'/%3E%3C/svg%3E">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&display=swap">

<style>
  :root{
    --ink:#101418;          /* texte principal */
    --ink-soft:#5B636C;     /* texte secondaire */
    --paper:#FFFFFF;        /* panneaux */
    --field:#EFF1F0;        /* fonds de champs */
    --line:#E1E4E2;         /* hairlines */
    --blaze:#E8490F;        /* orange balisage : action + tracé */
    --blaze-ink:#B33305;
    --pine:#0E5741;         /* vert sapin : sauvegarde / favoris */
    --radius:18px;
    --shadow:0 8px 28px rgba(16,20,24,.16);
    --sat:env(safe-area-inset-top,0px);
    --sab:env(safe-area-inset-bottom,0px);
  }
  /* Mode nuit : mêmes variables, palette sombre. Le orange/vert d'accent
     restent identiques (garde l'identité visuelle et le contraste voulu).
     Appliqué sur <html> (pas body) pour que le fond de html:{--paper} en profite aussi. */
  html.night{
    --ink:#EDEFEF;
    --ink-soft:#9AA3AA;
    --paper:#171B1F;
    --field:#242A30;
    --line:#333B42;
    --shadow:0 8px 28px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{
    height:100%;
    height:100dvh;
    overscroll-behavior:none;
    background:var(--paper);
  }
  body{
    position:fixed;
    inset:0;
    /* Pas de "height" ici : sur un élément fixed avec inset:0, top+bottom
       suffisent déjà à occuper tout l'écran. Ajouter une hauteur explicite
       (même via une variable JS) peut la sur-contraindre et laisser une
       bande vide en bas si le calcul sous-estime l'écran réel. */
    font-family:"Archivo",system-ui,-apple-system,"Segoe UI",sans-serif;
    font-variation-settings:"wdth" 100;
    color:var(--ink);
    overflow:hidden;
    overscroll-behavior:none;
    background:var(--field);
  }
  button{font:inherit;border:0;cursor:pointer;background:none;color:inherit}
  input{font:inherit;border:0;outline:0;background:none;color:inherit}

  #map{position:fixed;inset:0;z-index:0}
  .leaflet-control-attribution{font-size:9px}

  /* ---------- barre de recherche ---------- */
  .search{
    position:fixed;z-index:20;
    top:calc(var(--sat) + 12px);left:12px;right:12px;
    display:flex;gap:8px;
  }
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--paper);border-radius:999px;box-shadow:var(--shadow);
    padding:0 8px 0 16px;height:48px;
  }
  .search-box input{flex:1;min-width:0;font-size:15px}
  .search-box input::placeholder{color:var(--ink-soft)}
  .icon-btn{
    width:48px;height:48px;border-radius:999px;flex:none;
    background:var(--paper);box-shadow:var(--shadow);
    display:grid;place-items:center;font-size:20px;
  }
  .icon-btn:active{transform:scale(.94)}
  .search-results{
    position:fixed;z-index:20;
    top:calc(var(--sat) + 66px);left:12px;right:72px;
    background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;display:none;
  }
  .search-results.open{display:block}
  .search-results button{
    display:block;width:100%;text-align:left;
    padding:12px 16px;font-size:13.5px;border-bottom:1px solid var(--line);
  }
  .search-results button:last-child{border-bottom:0}
  .search-results button:active{background:var(--field)}

  .home-row{
    position:fixed;z-index:19;
    top:calc(var(--sat) + 66px);left:12px;
    display:flex;gap:8px;
  }
  .home-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--pine);color:#fff;border-radius:999px;
    padding:0 16px;height:42px;box-shadow:var(--shadow);
    font-size:13.5px;font-variation-settings:"wght" 700;
  }
  .home-btn:active{transform:scale(.96)}
  .home-ico{font-size:16px}
  .icon-btn.small{width:42px;height:42px;font-size:16px}

  /* ---------- panneau bas ---------- */
  .sheet{
    position:fixed;z-index:15;left:0;right:0;bottom:0;
    background:var(--paper);
    border-radius:22px 22px 0 0;
    box-shadow:0 -8px 32px rgba(16,20,24,.18);
    padding:14px 16px calc(var(--sab) + 14px);
    max-width:520px;margin:0 auto;
    transition:transform .25s ease;
  }
  /* Prolonge le fond blanc du panneau sous le bord bas de l'écran : si iOS
     laisse apparaître une zone résiduelle (bug de viewport en mode app),
     elle est recouverte en blanc au lieu de montrer une bande grise. */
  .sheet::after{
    content:"";
    position:absolute;
    left:0;right:0;top:100%;
    height:200px;
    background:var(--paper);
  }
  .sheet.folded{transform:translateY(calc(100% - 58px))}
  .sheet.compact .compact-hide{display:none}
  .sheet.compact .controls{margin-bottom:2px}
  #compactBtn.on{background:var(--pine);color:#fff}
  .grab{
    width:44px;height:5px;border-radius:99px;background:var(--line);
    margin:0 auto 4px;
    /* zone de préhension réellement tactile plus grande que le trait visible */
    box-sizing:content-box;position:relative;padding:10px 0;background-clip:content-box;
    touch-action:none;cursor:grab;
  }
  .grab:active{cursor:grabbing}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 10px;gap:10px}
  .sheet-head .sheet-title{flex:none}
  .sheet-head .sheet-hint{flex:1}
  .collapse-btn{
    flex:none;width:34px;height:34px;border-radius:10px;background:var(--field);
    font-size:16px;color:var(--ink-soft);transition:transform .25s ease;
  }
  .sheet.folded .collapse-btn{transform:rotate(180deg)}
  .sheet-title{
    font-variation-settings:"wdth" 122,"wght" 800;
    text-transform:uppercase;letter-spacing:.04em;font-size:15px;
  }
  .ver{
    font-size:10px;color:var(--ink-soft);vertical-align:super;
    font-variation-settings:"wdth" 100,"wght" 600;text-transform:none;letter-spacing:0;
  }
  .sheet-hint{font-size:12px;color:var(--ink-soft)}

  .controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{
    background:var(--field);border-radius:14px;padding:9px 14px 7px;
  }
  .field label{
    display:block;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ink-soft);
    font-variation-settings:"wght" 600;
  }
  .field input{
    width:100%;font-size:22px;
    font-variation-settings:"wdth" 110,"wght" 700;
    font-variant-numeric:tabular-nums;
  }
  .pace-row{display:flex;align-items:baseline;gap:2px}
  .pace-row input{width:0;flex:1;text-align:center}
  .pace-row input:first-child{text-align:right}
  .pace-row input:last-child{text-align:left}
  .pace-sep{font-size:22px;font-variation-settings:"wdth" 110,"wght" 700;color:var(--ink-soft);flex:none}
  /* masque les flèches de type=number pour un rendu propre */
  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .field input[type=number]{-moz-appearance:textfield}
  .actions{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;margin-top:10px}
  .vias{display:flex;align-items:center;gap:10px;margin-top:10px}
  .modes{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;
    background:var(--field);border-radius:12px;padding:4px;margin-top:10px;
  }
  .mode{
    height:38px;border-radius:9px;font-size:13.5px;
    font-variation-settings:"wght" 700;color:var(--ink-soft);
  }
  .mode.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 4px rgba(16,20,24,.12)}
  .marker-int{display:flex;gap:6px}
  .mi{
    background:var(--field);border-radius:999px;padding:6px 12px;
    font-size:12px;font-variation-settings:"wght" 700;color:var(--ink-soft);
  }
  .mi.on{background:var(--pine);color:#fff}
  .start-chips{
    display:flex;gap:8px;overflow-x:auto;padding:0 2px 10px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .start-chips::-webkit-scrollbar{display:none}
  .schip{
    flex:none;display:flex;align-items:center;gap:7px;
    background:var(--field);border-radius:999px;padding:8px 13px;
    font-size:13px;font-variation-settings:"wght" 700;white-space:nowrap;
  }
  .schip .x{color:var(--ink-soft);font-size:12px;padding:0 1px}
  .schip.add{background:var(--pine);color:#fff}
  .chip{
    background:var(--field);border-radius:999px;padding:8px 14px;
    font-size:13px;font-variation-settings:"wght" 700;
  }
  .chip.on{background:var(--pine);color:#fff}
  .chip.danger{color:var(--blaze-ink)}
  .via-info{font-size:12.5px;color:var(--ink-soft);flex:1}
  .via-pin{
    width:24px;height:24px;border-radius:8px;
    background:var(--pine);color:#fff;border:2px solid #fff;
    display:grid;place-items:center;
    font-size:12px;font-variation-settings:"wght" 800;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  .btn{
    height:52px;border-radius:14px;font-size:15px;
    font-variation-settings:"wdth" 112,"wght" 750;
    text-transform:uppercase;letter-spacing:.03em;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .1s ease, opacity .2s;
  }
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.45;pointer-events:none}
  .btn-blaze{background:var(--blaze);color:#fff}
  .btn-ghost{background:var(--field);width:52px;font-size:20px}
  .btn-gpx{width:auto;padding:0 13px;font-size:13px}
  .btn-pine{background:var(--pine);color:#fff;width:52px;font-size:20px}

  /* ---------- bandeau stats ---------- */
  .stats{
    display:none;grid-template-columns:1.2fr 1fr 1fr;gap:0;
    margin-top:12px;border-top:1px solid var(--line);padding-top:10px;
  }
  .stats.on{display:grid}
  .stat{padding:0 6px;border-left:1px solid var(--line)}
  .stat:first-child{border-left:0;padding-left:0}
  .stat b{
    display:block;font-size:26px;line-height:1.05;
    font-variation-settings:"wdth" 118,"wght" 820;
    font-variant-numeric:tabular-nums;
  }
  .stat b small{font-size:13px;font-variation-settings:"wdth" 100,"wght" 600;color:var(--ink-soft)}
  .stat span{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft)}
  .stat.blaze b{color:var(--blaze-ink)}
  #statElev.warn{color:var(--blaze-ink)}
  .elev-chart{margin-top:8px}
  .elev-chart svg{display:block;width:100%;height:52px;border-radius:8px;background:var(--field)}
  .elev-labels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-soft);margin-top:2px}
  .quality{font-size:11.5px;color:var(--ink-soft);margin-top:8px;text-align:center}
  .stats-head{display:flex;justify-content:flex-end;margin-top:12px}
  .unit-toggle{
    background:var(--field);border-radius:999px;padding:5px 12px;
    font-size:11px;font-variation-settings:"wght" 700;color:var(--ink-soft);
  }
  .share-chip{
    display:block;margin:10px auto 0;background:var(--field);
    padding:9px 16px;border-radius:999px;font-size:12.5px;
    font-variation-settings:"wght" 700;color:var(--ink);
  }

  /* ---------- favoris ---------- */
  .panel{
    position:fixed;inset:0;z-index:30;
    background:var(--paper);
    transform:translateX(105%);transition:transform .28s ease;
    display:flex;flex-direction:column;
    padding:calc(var(--sat) + 10px) 16px calc(var(--sab) + 10px);
  }
  .panel.open{transform:translateX(0)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:6px 0 14px}
  .panel-head h2{
    font-size:22px;text-transform:uppercase;letter-spacing:.03em;
    font-variation-settings:"wdth" 122,"wght" 830;
  }
  .fav-list{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .fav{
    border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .fav-info{flex:1 1 100%;min-width:0}
  .fav-info b{display:block;font-size:15px;font-variation-settings:"wght" 700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fav-info span{font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .fav .load{background:var(--field);border-radius:10px;padding:9px 13px;font-size:13px;font-variation-settings:"wght" 700}
  .fav .del{color:var(--blaze-ink);font-size:17px;padding:8px}
  .empty{color:var(--ink-soft);text-align:center;margin-top:40px;font-size:14px;line-height:1.6}

  .run-summary{
    display:flex;gap:18px;padding:12px 4px 16px;margin-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .run-summary .rs{flex:1}
  .run-summary b{
    display:block;font-size:22px;line-height:1.1;
    font-variation-settings:"wdth" 116,"wght" 800;font-variant-numeric:tabular-nums;
  }
  .run-summary span{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft)}

  .section-label{
    font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);
    font-variation-settings:"wght" 700;margin:10px 2px 8px;
  }
  .recent-section{margin-bottom:6px}
  .recent-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .recent-chip{
    flex:none;background:var(--field);border-radius:14px;padding:10px 14px;min-width:120px;
  }
  .recent-chip b{display:block;font-size:14px;font-variation-settings:"wght" 700}
  .recent-chip span{font-size:11.5px;color:var(--ink-soft)}

  .run-btn{
    background:var(--field);border-radius:10px;padding:8px 12px;
    font-size:12px;font-variation-settings:"wght" 700;color:var(--ink-soft);white-space:nowrap;
  }
  .run-btn.done{background:var(--pine);color:#fff}

  .week-chart{padding:4px 2px 14px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .week-chart .wc-bars{display:flex;align-items:flex-end;gap:10px;height:64px}
  .week-chart .wc-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .week-chart .wc-bar{width:100%;border-radius:5px 5px 2px 2px;background:var(--blaze);min-height:3px}
  .week-chart .wc-lbl{font-size:10px;color:var(--ink-soft);margin-top:6px}
  .week-chart .wc-val{font-size:10px;color:var(--ink-soft);margin-bottom:3px;font-variant-numeric:tabular-nums}

  .fav-label-row{display:flex;align-items:center;justify-content:space-between}
  .mini-link{font-size:11.5px;color:var(--pine);font-variation-settings:"wght" 700;text-decoration:underline}

  /* ---------- toast & loader ---------- */
  .toast{
    position:fixed;z-index:40;left:50%;transform:translateX(-50%) translateY(20px);
    bottom:calc(var(--sab) + 90px);
    background:var(--ink);color:#fff;font-size:13.5px;
    padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;
    transition:.25s;max-width:88vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .spin{
    width:18px;height:18px;border-radius:50%;flex:none;
    border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;
    animation:sp .7s linear infinite;display:none;
  }
  .busy .spin{display:block}
  @keyframes sp{to{transform:rotate(1turn)}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  .start-pin{
    width:20px;height:20px;border-radius:50%;
    background:var(--ink);border:4px solid #fff;
    box-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  .km-dot{
    width:22px;height:22px;border-radius:50%;
    background:#fff;border:2px solid var(--blaze);
    display:grid;place-items:center;
    font-size:11px;font-variation-settings:"wght" 800;color:var(--blaze-ink);
    box-shadow:0 1px 4px rgba(0,0,0,.35);
  }
  .km-dot-mini{
    width:10px;height:10px;border:2px solid var(--blaze);background:#fff;
  }
  .dir-arrow{
    font-size:15px;line-height:1;color:#fff;
    text-shadow:0 0 2px var(--blaze-ink),0 0 2px var(--blaze-ink),0 0 3px var(--blaze-ink);
    pointer-events:none;
  }
</style>
</head>
<body>

<div id="map"></div>

<!-- Recherche d'adresse -->
<div class="search">
  <form class="search-box" id="searchForm">
    <span aria-hidden="true">⌕</span>
    <input id="searchInput" type="search" placeholder="Chercher un lieu de départ…" autocomplete="off">
  </form>
  <button class="icon-btn" id="locateBtn" title="Ma position" aria-label="Ma position">◎</button>
  <button class="icon-btn" id="resetBtn" title="Réinitialiser la carte" aria-label="Réinitialiser la carte">↺</button>
  <button class="icon-btn" id="favOpenBtn" title="Favoris" aria-label="Favoris">★</button>
</div>
<div class="search-results" id="searchResults"></div>

<div class="home-row" id="homeRow">
  <button class="home-btn" id="homeBtn">
    <span class="home-ico">⌂</span>
    <span id="homeLabel">Définir « Maison »</span>
  </button>
  <button class="icon-btn small" id="homeEditBtn" title="Modifier l'adresse Maison" aria-label="Modifier" hidden>✎</button>
  <button class="icon-btn small" id="nightBtn" title="Mode nuit" aria-label="Mode nuit">☾</button>
</div>

<!-- Panneau principal -->
<section class="sheet" id="sheet">
  <div class="grab" id="grab"></div>
  <div class="sheet-head">
    <div class="sheet-title">Nouvelle boucle <span class="ver">v3</span></div>
    <div class="sheet-hint" id="startHint">Touchez la carte pour placer le départ</div>
    <button class="collapse-btn" id="compactBtn" title="Mode épuré : ne garder que l'essentiel" aria-label="Mode épuré">▤</button>
    <button class="collapse-btn" id="collapseBtn" title="Réduire le panneau" aria-label="Réduire le panneau">▾</button>
  </div>

  <div class="start-chips" id="startChips"></div>

  <div class="controls">
    <div class="field">
      <label for="distInput">Distance visée (km)</label>
      <input id="distInput" type="number" inputmode="decimal" min="1" max="60" step="0.5" value="8">
    </div>
    <div class="field">
      <label for="paceMin">Allure (min/km)</label>
      <div class="pace-row">
        <input id="paceMin" type="number" inputmode="numeric" min="2" max="20" value="5" aria-label="Minutes">
        <span class="pace-sep">:</span>
        <input id="paceSec" type="number" inputmode="numeric" min="0" max="59" value="30" aria-label="Secondes">
      </div>
    </div>
  </div>

  <div class="modes compact-hide" id="modes">
    <button class="mode on" data-mode="mix">Mixte</button>
    <button class="mode" data-mode="trail">Forêt</button>
    <button class="mode" data-mode="road">Route</button>
  </div>

  <div class="vias compact-hide">
    <button class="chip" id="viaBtn">＋ Passage obligé</button>
    <span class="via-info" id="viaInfo">aucun</span>
    <button class="chip danger" id="viaClearBtn" hidden>Effacer</button>
  </div>

  <div class="vias compact-hide">
    <button class="chip" id="quietBtn">🤫 Rues calmes</button>
    <span class="via-info">évite les grands axes (Mixte/Route)</span>
  </div>

  <div class="vias compact-hide">

<script>
"use strict";

/* Contourne un bug iOS Safari (surtout en app écran d'accueil) : après
   l'ouverture puis la fermeture d'un clavier (champs numériques distance/
   allure/recherche), la hauteur de page reste parfois figée sur l'ancienne
   valeur réduite, laissant une bande grise en bas. On pilote la hauteur via
   une variable CSS recalculée à chaque changement réel de viewport. */
function setAppHeight(){
  const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  document.documentElement.style.setProperty("--app-h", h + "px");
}
setAppHeight();
window.addEventListener("resize", setAppHeight);
window.addEventListener("orientationchange", () => setTimeout(setAppHeight, 50));
if (window.visualViewport){
  window.visualViewport.addEventListener("resize", setAppHeight);
  window.visualViewport.addEventListener("scroll", setAppHeight);
}
// Un input qui perd le focus (clavier qui se ferme) déclenche aussi un recalcul,
// avec un léger délai le temps que Safari termine son animation de clavier.
document.addEventListener("focusout", () => setTimeout(setAppHeight, 60), true);

/* Garde-fou : si Leaflet n'a pas pu être chargé (CDN bloqué, hors-ligne,
   webview sandboxée…), on affiche un message clair au lieu d'un écran noir. */
if (typeof L === "undefined") {
  document.body.insertAdjacentHTML("beforeend",
    '<div style="position:fixed;inset:0;z-index:99;background:#101418;color:#fff;' +
    'display:grid;place-items:center;padding:24px;text-align:center;font-size:15px;line-height:1.6">' +
    "<div><b>Impossible de charger la carte.</b><br>" +
    "Cet environnement bloque les ressources externes (CDN Leaflet, tuiles OSM).<br>" +
    "Ouvrez ce fichier dans Safari ou Chrome, servi en HTTP(S).</div></div>");
  throw new Error("Leaflet non chargé (ressources externes bloquées ?)");
}

/* ================= Config ================= */
// Le serveur démo router.project-osrm.org ne calcule en réalité que le profil
// voiture. Pour un vrai routage PIÉTON on utilise l'instance publique FOSSGIS
// (routing.openstreetmap.de), avec repli sur le serveur démo si indisponible.
const ROUTERS = [
  "https://routing.openstreetmap.de/routed-foot/route/v1/foot/",
  "https://router.project-osrm.org/route/v1/foot/"
];
const NOMINATIM = "https://nominatim.openstreetmap.org/search";
const ELEVATION = "https://api.open-elevation.com/api/v1/lookup";
const LS_FAVS   = "boucle.favs.v1";
const LS_RECENT = "boucle.recent.v1";

function getRecent(){ try{ return JSON.parse(localStorage.getItem(LS_RECENT) || "[]"); }catch{ return []; } }
function setRecent(v){ try{ localStorage.setItem(LS_RECENT, JSON.stringify(v)); }catch{} }
function pushRecent(entry){
  let arr = getRecent();
  arr.unshift(entry);
  arr = arr.slice(0, 3);
  setRecent(arr);
  renderRecent();
}
function updateRecentElev(id, gain, elev){
  const arr = getRecent();
  const it = arr.find(x => x.id === id);
  if (it){ it.gain = gain; it.elev = elev; setRecent(arr); }
}
function renderRecent(){
  const arr = getRecent();
  const section = $("recentSection");
  section.hidden = !arr.length;
  if (!arr.length) return;
  const row = $("recentRow");
  row.innerHTML = "";
  for (const r of arr){
    const c = document.createElement("button");
    c.className = "recent-chip";
    const gain = (r.gain != null) ? ` · ${fmtElevGain(r.gain)} D+` : "";
    c.innerHTML = `<b></b><span>${fmtDist(r.distance)}${gain}</span>`;
    c.querySelector("b").textContent = r.name;
    c.addEventListener("click", () => loadFav(r, false));   // même format que les favoris, mais pas encore sauvegardée
    row.appendChild(c);

}
const LS_PREFS  = "boucle.prefs.v1";
const TOL_M     = 200;    // cible idéale : ±200 m si le réseau le permet
const TOL_MAX_M = 500;    // plafond garanti : on insiste tant qu'on est au-delà
const MAX_TRIES = 12;
const MAX_RESCUE_TRIES = 8;   // tentatives supplémentaires dédiées à la distance si besoin

/* ================= Carte ================= */
const map = L.map("map", { zoomControl:false }).setView([46.6, 2.4], 6);   // France entière
const lightTiles = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
});
const darkTiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  maxZoom: 19, subdomains: "abcd",
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
});
L.control.zoom({ position:"topright" }).addTo(map);

let startMarker = null, routeLayer = null, meMarker = null;
let nightOverride = null;   // null = auto (selon l'heure), true/false = forcé par l'utilisateur
let unitSystem = "km";      // km | mi — affichage uniquement ; distance cible et allure restent en km en interne
let currentRoute = null;   // { geojson, distance, gain, start:[lat,lng] }
let generating = false;

const $ = id => document.getElementById(id);
const toastEl = $("toast");

/* ---- unité d'affichage km/mi : purement présentationnel, tous les calculs
   internes (target, allure, OSRM…) restent en mètres/km ---- */
function fmtDist(m){
  return unitSystem === "mi"
    ? (m / 1609.344).toFixed(2) + " mi"
    : (m / 1000).toFixed(2) + " km";
}
function fmtElevGain(m){
  return unitSystem === "mi"
    ? Math.round(m * 3.28084) + " ft"
    : Math.round(m) + " m";
}
function applyUnit(){
  $("unitBtn").textContent = unitSystem;
  if (currentRoute){
    $("statDist").innerHTML = fmtDist(currentRoute.distance).replace(/(km|mi)$/, "<small>$1</small>");
    if (currentRoute.gain != null)
      $("statElev").innerHTML = fmtElevGain(currentRoute.gain).replace(/(m|ft)$/, "<small>$1</small>");
  }
  renderFavs();   // réaffiche favoris/récentes/résumé dans la nouvelle unité
}
$("unitBtn").addEventListener("click", () => {
  unitSystem = unitSystem === "km" ? "mi" : "km";
  applyUnit();
  savePrefs();
});
let toastTimer;

/* ---- mode nuit : auto selon l'heure locale (heuristique simple, sans API
   d'ensoleillement), ou forcé via le bouton lune/soleil ---- */
function isNightNow(){
  if (nightOverride !== null) return nightOverride;
  const h = new Date().getHours();
  return h < 7 || h >= 21;
}
function applyNightMode(){
  const night = isNightNow();
  document.documentElement.classList.toggle("night", night);
  if (night){ if (map.hasLayer(lightTiles)) map.removeLayer(lightTiles); darkTiles.addTo(map); }
  else      { if (map.hasLayer(darkTiles))  map.removeLayer(darkTiles);  lightTiles.addTo(map); }
  $("nightBtn").textContent = night ? "☀" : "☾";
  $("nightBtn").title = night ? "Passer en mode jour" : "Passer en mode nuit";
}
$("nightBtn").addEventListener("click", () => {
  nightOverride = !isNightNow();
  applyNightMode();
  savePrefs();
});
applyNightMode();
// Réévalue le mode auto toutes les 10 min (au cas où l'heure franchit un seuil pendant l'usage)
setInterval(() => { if (nightOverride === null) applyNightMode(); }, 10*60*1000);
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove("show"), 3200);
}

function setStart(lat, lng, pan){

    startMarker = L.marker([lat,lng], {
      draggable:true,

    }).addTo(map);

map.on("click", e => {

/* ---- points de passage obligés ---- */
let viaMarkers = [];
let viaMode = false;

function viaIcon(n){
  return L.divIcon({ className:"", html:`<div class="via-pin">${n}</div>`,
                     iconSize:[24,24], iconAnchor:[12,12] });
}
function refreshVias(){
  viaMarkers.forEach((m,i) => m.setIcon(viaIcon(i+1)));
  $("viaInfo").textContent = viaMarkers.length
    ? viaMarkers.length + " point" + (viaMarkers.length > 1 ? "s" : "") + " — touchez un marqueur pour le retirer"
    : "aucun";
  $("viaClearBtn").hidden = !viaMarkers.length;
}
function addVia(lat, lng){
  const m = L.marker([lat,lng], { draggable:true, icon: viaIcon(viaMarkers.length+1) }).addTo(map);
  m.on("click", () => {
    map.removeLayer(m);
    viaMarkers = viaMarkers.filter(x => x !== m);

$("viaBtn").addEventListener("click", () => {

/* ---- géolocalisation ---- */
$("locateBtn").addEventListener("click", () => {

/* ================= Recherche Nominatim ================= */

/* ================= Maison (départ + génération en un geste) ================= */

/* ================= Départs favoris ================= */
const LS_STARTS = "boucle.starts.v1";
function getStarts(){ try{ return JSON.parse(localStorage.getItem(LS_STARTS) || "[]"); }catch{ return []; } }
function setStarts(v){ try{ localStorage.setItem(LS_STARTS, JSON.stringify(v)); }catch{} }

function renderStartChips(){

/* ================= Mode de course & zones vertes ================= */
let runMode = "mix";   // mix | trail | road
let quietStreets = false;   // évite les grands axes en modes Mixte/Route
document.querySelectorAll(".mode").forEach(b => b.addEventListener("click", () => {
  runMode = b.dataset.mode;
  document.querySelectorAll(".mode").forEach(x => x.classList.toggle("on", x === b));
  savePrefs();

  $("quietBtn").classList.toggle("on", quietStreets);

document.querySelectorAll(".mi").forEach(b => b.addEventListener("click", () => {
  markerIntervalM = parseInt(b.dataset.int, 10);
  document.querySelectorAll(".mi").forEach(x => x.classList.toggle("on", x === b));
  if (currentRoute) decorateRoute(currentRoute.geojson.geometry.coordinates);   // re-décore le tracé affiché

// Centres des zones boisées/vertes autour d'un point (Overpass / OpenStreetMap)
let greenCache = { key:null, pts:[] };
async function fetchGreenCenters(lat, lng, radiusM){
  const key = lat.toFixed(3) + "," + lng.toFixed(3) + "," + Math.round(radiusM/500);
  if (greenCache.key === key) return greenCache.pts;
  const r = Math.round(radiusM * 1.4);
  const q = `[out:json][timeout:10];(` +
    `way["natural"~"wood|heath|scrub"](around:${r},${lat},${lng});` +
    `way["landuse"~"forest|meadow"](around:${r},${lat},${lng});` +
    `way["leisure"~"park|nature_reserve"](around:${r},${lat},${lng});` +
    `);out center 120;`;
  const resp = await fetch("https://overpass-api.de/api/interpreter", {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded" },
    body:"data=" + encodeURIComponent(q)
  });
  const j = await resp.json();
  const pts = (j.elements || []).map(e => e.center ? [e.center.lat, e.center.lon] : null).filter(Boolean);
  greenCache = { key, pts };
  return pts;
}

// Points le long des grands axes (route Overpass : primaire/secondaire/nationale…)
let busyCache = { key:null, pts:[] };
async function fetchBusyRoadPoints(lat, lng, radiusM){
  const key = lat.toFixed(3) + "," + lng.toFixed(3) + "," + Math.round(radiusM/500);
  if (busyCache.key === key) return busyCache.pts;
  const r = Math.round(radiusM * 1.3);
  const q = `[out:json][timeout:10];(` +
    `way["highway"~"^(motorway|trunk|primary|secondary)$"](around:${r},${lat},${lng});` +
    `);out geom 200;`;
  const resp = await fetch("https://overpass-api.de/api/interpreter", {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded" },
    body:"data=" + encodeURIComponent(q)
  });
  const j = await resp.json();
  // échantillonne quelques points le long de chaque way plutôt que juste son centre
  const pts = [];
  for (const e of (j.elements || [])){
    if (!e.geometry) continue;
    const step = Math.max(1, Math.floor(e.geometry.length / 4));
    for (let i=0; i<e.geometry.length; i+=step) pts.push([e.geometry[i].lat, e.geometry[i].lon]);
  }
  busyCache = { key, pts };
  return pts;
}

// Attire (trail) ou éloigne (road) les points aléatoires des zones vertes
function biasWaypoints(rand, green, cLat, cLng, radius){
  if (!green.length || runMode === "mix") return rand;
  if (runMode === "trail"){
    return rand.map(p => {
      let bestPt = null, bestD = Infinity;
      for (const g of green){ const d = haversine(p, g); if (d < bestD){ bestD = d; bestPt = g; } }
      if (bestD > radius * 0.5) return p;              // aucun bois à portée : on garde le point
      // léger décalage autour du centre du bois pour varier les boucles
      return destPoint(bestPt[0], bestPt[1], 80 + Math.random()*220, Math.random()*360);
    });
  }
  // road : ré-échantillonner les points trop proches d'une zone verte
  return rand.map(p => {
    for (let k=0; k<6; k++){
      if (!green.some(g => haversine(p, g) < 300)) return p;
      p = destPoint(cLat, cLng, radius*(0.85 + Math.random()*0.3), Math.random()*360);
    }
    return p;
  });
}

// Éloigne les points aléatoires des grands axes (motorway/trunk/primary/secondary),
// utilisé en modes Mixte et Route pour privilégier des rues plus calmes.
function avoidBusyRoads(rand, busy, cLat, cLng, radius){
  if (!busy.length) return rand;
  return rand.map(p => {
    for (let k=0; k<5; k++){
      if (!busy.some(b => haversine(p, b) < 120)) return p;
      p = destPoint(cLat, cLng, radius*(0.7 + Math.random()*0.6), Math.random()*360);
    }
    return p;   // aucune alternative trouvée en 5 essais : on garde le dernier point
  });
}

/* ================= Génération de boucle ================= */
function destPoint(lat, lng, distM, bearingDeg){
  const R = 6371000, d = distM / R, br = bearingDeg * Math.PI/180;
  const φ1 = lat*Math.PI/180, λ1 = lng*Math.PI/180;
  const φ2 = Math.asin(Math.sin(φ1)*Math.cos(d) + Math.cos(φ1)*Math.sin(d)*Math.cos(br));
  const λ2 = λ1 + Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(φ1),
                             Math.cos(d)-Math.sin(φ1)*Math.sin(φ2));
  return [φ2*180/Math.PI, ((λ2*180/Math.PI)+540)%360-180];
}

/* ---- points aléatoires disposés en cercle, avec une répartition ORGANIQUE
   plutôt que régulière : les arcs entre points sont de tailles aléatoires
   (méthode des espacements de Dirichlet), donnant des boucles tantôt
   arrondies, tantôt allongées ou tassées d'un côté — plutôt que toujours
   une même forme presque circulaire simplement pivotée. ---- */
function circleWaypoints(lat, lng, radius, n, rotation){
  // n coupures aléatoires sur [0,360) → n arcs de tailles inégales
  const cuts = Array.from({length:n}, () => Math.random()*360).sort((a,b)=>a-b);
  const pts = [];
  for (let i=0;i<n;i++){
    const angle = rotation + cuts[i] + (Math.random()*20-10);
    const r = radius * (0.65 + Math.random()*0.7);   // rayon très variable : ±35 %
    pts.push(destPoint(lat, lng, r, angle));
  }
  return pts;
}

/* ---- géométrie utilitaire ([lat,lng]) ---- */
function haversine(a, b){
  const R = 6371000, toR = Math.PI/180;
  const dφ = (b[0]-a[0])*toR, dλ = (b[1]-a[1])*toR;
  const s = Math.sin(dφ/2)**2 + Math.cos(a[0]*toR)*Math.cos(b[0]*toR)*Math.sin(dλ/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function bearingDeg(a, b){
  const toR = Math.PI/180;
  const y = Math.sin((b[1]-a[1])*toR)*Math.cos(b[0]*toR);
  const x = Math.cos(a[0]*toR)*Math.sin(b[0]*toR) -
            Math.sin(a[0]*toR)*Math.cos(b[0]*toR)*Math.cos((b[1]-a[1])*toR);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

/* ---- bornes km + flèches de sens le long du tracé (coords GeoJSON [lng,lat]) ---- */
let decorLayer = null;
let markerIntervalM = 1000;   // borne tous les X mètres, réglable (1000/500/200)
function decorateRoute(lineCoords){
  if (decorLayer) map.removeLayer(decorLayer);
  decorLayer = L.layerGroup().addTo(map);
  let acc = 0, nextKm = markerIntervalM, nextArrow = 400;
  const showNumbers = markerIntervalM >= 500;   // en dessous, trop de pastilles : on garde juste des repères sans numéro
  for (let i=1; i<lineCoords.length; i++){
    const a = [lineCoords[i-1][1], lineCoords[i-1][0]];
    const b = [lineCoords[i][1],   lineCoords[i][0]];
    acc += haversine(a, b);
    if (acc >= nextArrow){
      const rot = bearingDeg(a, b) - 90;   // "➤" pointe vers l'est par défaut
      L.marker(b, { interactive:false, icon: L.divIcon({ className:"",
        html:`<div class="dir-arrow" style="transform:rotate(${rot.toFixed(0)}deg)">➤</div>`,
        iconSize:[16,16], iconAnchor:[8,8] }) }).addTo(decorLayer);
      nextArrow += 700;
    }
    if (acc >= nextKm){
      const label = showNumbers
        ? (markerIntervalM >= 1000 ? Math.round(nextKm/1000) : (nextKm/1000).toFixed(1))
        : "";
      L.marker(b, { interactive:false, icon: L.divIcon({ className:"",
        html: showNumbers ? `<div class="km-dot">${label}</div>` : `<div class="km-dot km-dot-mini"></div>`,
        iconSize: showNumbers ? [22,22] : [10,10], iconAnchor: showNumbers ? [11,11] : [5,5] }) }).addTo(decorLayer);
      nextKm += markerIntervalM;
    }
  }
}

/* ---- ordonner des points autour d'un centre, en partant de l'angle du départ ---- */
function orderAround(cLat, cLng, startPt, pts, dir){
  const ang = p => bearingDeg([cLat,cLng], p);
  const a0 = ang(startPt);
  const key = p => ((ang(p) - a0) * dir + 720) % 360;
  return pts.slice().sort((p,q) => key(p) - key(q));
}

/* ---- taux de repli : part des segments parcourus deux fois ---- */
function overlapRatio(lineCoords){
  const seen = new Set(); let dup = 0;
  for (let i=1; i<lineCoords.length; i++){
    const k1 = lineCoords[i-1][0].toFixed(4) + "," + lineCoords[i-1][1].toFixed(4);
    const k2 = lineCoords[i][0].toFixed(4) + "," + lineCoords[i][1].toFixed(4);
    if (k1 === k2) continue;
    const key = k1 < k2 ? k1+"|"+k2 : k2+"|"+k1;
    if (seen.has(key)) dup++; else seen.add(key);
  }
  return dup / Math.max(1, seen.size);
}

/* ---- excision des antennes : à chaque nouveau point, on regarde si le
   tracé revient près d'un point déjà visité RÉCEMMENT (fenêtre glissante,
   pas seulement le tout dernier point) — si oui, tout ce qui a été fait
   "pour rien" entre les deux est retiré. Ça couvre en un seul mécanisme :
   l'aller-retour simple, le détour à plusieurs points intermédiaires
   (impasse avec un coude, lacet autour d'un étang…), et le cas où ça
   survient dès le tout début du tracé. Un passage obligé stoppe la
   recherche en arrière : on ne coupe jamais à travers lui. Le tout DERNIER
   point (qui referme la boucle sur le départ) est exclu de cette recherche :
   sinon il "matcherait" systématiquement le point de départ et effacerait
   tout le reste du parcours à chaque génération. ---- */
function pruneSpurs(lineCoords, protectLatLng){
  const TOL = 22;      // tolérance élargie : capte les doublons même légèrement décalés
  const WINDOW = 60;   // profondeur de recherche en arrière (points)
  const prot = c => protectLatLng.some(v => haversine([c[1],c[0]], v) < 60);
  const near = (a,b,m) => haversine([a[1],a[0]], [b[1],b[0]]) < m;
  let pts = lineCoords, rounds = 0, changed = true;
  while (changed && rounds++ < 6){
    changed = false;
    const out = [];
    for (let i = 0; i < pts.length; i++){
      const p = pts[i];
      if (i < pts.length - 1){
        const lo = Math.max(0, out.length - WINDOW);
        let cut = -1;
        for (let k = out.length - 1; k >= lo; k--){
          if (prot(out[k])) break;         // ne jamais couper à travers un passage obligé
          if (near(out[k], p, TOL)){ cut = k; break; }
        }
        if (cut >= 0 && cut < out.length - 1){
          out.length = cut + 1;
          changed = true;
        }
      }
      if (!out.length || !near(out[out.length-1], p, 3)) out.push(p);
      else changed = true;
    }
    if (out.length < 4) break;
    pts = out;
  }
  return pts;
}

/* ---- longueur d'un tracé GeoJSON [lng,lat] en mètres ---- */
function lineLength(lineCoords){
  let d = 0;
  for (let i=1; i<lineCoords.length; i++)
    d += haversine([lineCoords[i-1][1], lineCoords[i-1][0]], [lineCoords[i][1], lineCoords[i][0]]);
  return d;
}

/* ---- route OSRM nettoyée de ses antennes, distance recalculée ---- */
function cleanRoute(route, vias){
  const pruned = pruneSpurs(route.geometry.coordinates, vias);
  if (pruned.length < route.geometry.coordinates.length){
    route.geometry.coordinates = pruned;
    route.distance = lineLength(pruned);
  }
  return route;
}

let usedFallbackRouter = false;
async function osrmRoute(coords){
  const path = coords.map(c => `${c[1].toFixed(6)},${c[0].toFixed(6)}`).join(";");
  const qs = "?overview=full&geometries=geojson&steps=false&continue_straight=true";
  let lastErr;
  for (let i=0; i<ROUTERS.length; i++){
    try{
      const r = await fetch(ROUTERS[i] + path + qs);
      const j = await r.json();
      if (j.code === "Ok" && j.routes && j.routes.length){
        usedFallbackRouter = (i > 0);
        return j.routes[0];
      }
      lastErr = new Error(j.code || "Pas de route");
    }catch(err){ lastErr = err; }
  }
  throw lastErr || new Error("Routage indisponible");
}

async function generateLoop(reroll){
  if (generating) return;
  if (!startMarker) return toast("Placez d'abord un point de départ (carte, recherche ou ◎)");
  const targetKm = parseFloat($("distInput").value);
  if (!targetKm || targetKm < 1 || targetKm > 60) return toast("Distance entre 1 et 60 km");

  generating = true;
  $("genBtn").classList.add("busy");
  $("rerollBtn").disabled = true;
  $("saveBtn").disabled = true;
  $("gpxBtn").disabled = true;

  const { lat, lng } = startMarker.getLatLng();
  const start = [lat, lng];
  const target = targetKm * 1000;
  const vias = viaMarkers.map(m => { const p = m.getLatLng(); return [p.lat, p.lng]; });
  const nWp = targetKm <= 4 ? 3 : targetKm <= 12 ? 4 : 5;
  const nRandBase = Math.max(vias.length ? 1 : 3, nWp - vias.length);
  let rotation = Math.random()*360;
  let dir = Math.random() < 0.5 ? 1 : -1;      // sens de la boucle, aléatoire

  // Centre du nuage de points imposés (départ + passages)
  const anchor = [start, ...vias];
  const cLat = anchor.reduce((s,p)=>s+p[0],0)/anchor.length;
  const cLng = anchor.reduce((s,p)=>s+p[1],0)/anchor.length;
  const farthest = Math.max(...anchor.map(p => haversine([cLat,cLng], p)));

  // Rayon initial : périmètre du cercle ≈ distance cible, corrigé (les rues
  // rallongent ~15 %), et au moins au niveau du point imposé le plus éloigné
  let radius = Math.max(target / (2*Math.PI) / 1.15, farthest * 1.1);
  let best = null;

  try{
    // Zones vertes autour du centre (pour les modes Forêt et Route)
    let green = [];
    if (runMode !== "mix"){
      green = await fetchGreenCenters(cLat, cLng, radius).catch(() => []);
      if (runMode === "trail" && !green.length)
        toast("Aucune zone boisée trouvée autour du départ — boucle classique générée");
    }
    // Grands axes à éviter (option "Rues calmes", Mixte et Route uniquement)
    let busy = [];
    if (quietStreets && runMode !== "trail")
      busy = await fetchBusyRoadPoints(cLat, cLng, radius).catch(() => []);

    // Si les passages obligés couvrent déjà (ou dépassent) la distance cible,
    // inutile d'ajouter des points aléatoires : on route simplement à travers eux.
    if (vias.length){
      const baseRoute = cleanRoute(await osrmRoute([start, ...vias, start]), vias);
      if (baseRoute.distance >= target - TOL_M){
        displayRoute(baseRoute, start);
        if (baseRoute.distance > target + TOL_M)
          toast(`Vos points de passage imposent déjà ${(baseRoute.distance/1000).toFixed(1)} km`);
        return;
      }
    }
    const WAVE = 3;
    let tried = 0;
    const qualified = [];   // toutes les boucles qui passent les seuils qualité, tous essais confondus
    while (tried < MAX_TRIES){
      $("genLabel").textContent = `Essais ${tried+1}–${Math.min(tried+WAVE, MAX_TRIES)}/${MAX_TRIES}…`;
      // Une vague = 3 candidats en parallèle (orientations, sens ET forme variés)
      const batch = [];
      for (let k=0; k<WAVE && tried+k < MAX_TRIES; k++){
        const rot = (k === 0) ? rotation : Math.random()*360;
        const d   = (k % 2 === 0) ? dir : -dir;
        const nRand = Math.max(2, nRandBase + Math.round(Math.random()*2) - 1);   // ±1 point, pour varier la forme
        batch.push((async () => {
          let rand = circleWaypoints(cLat, cLng, radius, nRand, rot);
          rand = biasWaypoints(rand, green, cLat, cLng, radius);
          rand = avoidBusyRoads(rand, busy, cLat, cLng, radius);
          const wps = orderAround(cLat, cLng, start, [...vias, ...rand], d);
          return cleanRoute(await osrmRoute([start, ...wps, start]), vias);
        })());
      }
      const results = await Promise.allSettled(batch);
      tried += batch.length;

      let waveClosest = null;
      for (const r of results){
        if (r.status !== "fulfilled") continue;
        const route = r.value;
        const errM = Math.abs(route.distance - target);
        const ov  = overlapRatio(route.geometry.coordinates);
        // Score global : écart de distance relatif + forte pénalité dès 4 % d'aller-retour
        const score = errM/target + Math.max(0, ov - 0.04) * 3;
        if (!best || score < best.score) best = { route, score, errM, ov };
        if (errM <= TOL_M && ov <= 0.09) qualified.push({ route, errM, ov });
        if (waveClosest === null || errM < Math.abs(waveClosest - target)) waveClosest = route.distance;
      }
      // Dès qu'on a au moins 2 boucles valables (ou qu'on a fait 2 vagues), on peut
      // choisir parmi elles au hasard plutôt que de foncer sur le premier succès :
      // ça évite de toujours retomber sur "la" boucle la plus efficace du quartier.
      if (qualified.length >= 2 || (qualified.length >= 1 && tried >= WAVE*2)) break;
      // Ajustement proportionnel du rayon d'après le meilleur essai de la vague
      if (waveClosest !== null)
        radius *= Math.min(1.6, Math.max(0.55, target/waveClosest));
      rotation = Math.random()*360;
      dir = -dir;
    }

    // Phase de secours : si on est encore à plus de 500 m de la cible malgré
    // les tentatives normales, on insiste avec des essais supplémentaires
    // concentrés uniquement sur la distance (on laisse de côté le critère de
    // repli le temps de se rapprocher), en ajustant le rayon plus franchement.
    if (best && Math.abs(best.route.distance - target) > TOL_MAX_M){
      for (let t = 0; t < MAX_RESCUE_TRIES && Math.abs(best.route.distance - target) > TOL_MAX_M; t++){
        $("genLabel").textContent = `Ajustement de la distance… (${t+1}/${MAX_RESCUE_TRIES})`;
        try{
          let rand = circleWaypoints(cLat, cLng, radius, nRandBase, Math.random()*360);
          rand = biasWaypoints(rand, green, cLat, cLng, radius);
          rand = avoidBusyRoads(rand, busy, cLat, cLng, radius);
          const wps = orderAround(cLat, cLng, start, [...vias, ...rand], dir);
          const route = cleanRoute(await osrmRoute([start, ...wps, start]), vias);
          const errM = Math.abs(route.distance - target);
          const ov = overlapRatio(route.geometry.coordinates);
          const score = errM/target + Math.max(0, ov - 0.04) * 3;
          if (errM < best.errM) best = { route, score, errM, ov };
          radius *= Math.min(1.8, Math.max(0.5, target / route.distance));
          dir = -dir;
        }catch{ /* on continue avec les tentatives suivantes malgré l'échec ponctuel */ }
      }
    }

    const picked = qualified.length
      ? qualified[Math.floor(Math.random()*qualified.length)]
      : best;
    if (!picked) throw new Error("Aucun itinéraire calculable");
    displayRoute(picked.route, [lat,lng]);
    if (navigator.vibrate) navigator.vibrate(60);   // pas d'effet sur iOS Safari (API non supportée), inoffensif
    if (picked.errM > TOL_MAX_M)
      toast(`⚠ Réseau très clairsemé ici : ${(picked.route.distance/1000).toFixed(2)} km obtenus malgré plusieurs tentatives (cible ${targetKm} km)`);
    else if (picked.errM > TOL_M)
      toast(`${(picked.route.distance/1000).toFixed(2)} km obtenus (cible ${targetKm} km, écart sous 500 m)`);
    if (usedFallbackRouter)
      toast("⚠ Serveur piéton indisponible — itinéraire calculé en profil routier, chemins et sentiers ignorés");
  }catch(err){
    console.error(err);
    toast("Impossible de calculer un itinéraire ici. Réessayez ou déplacez le départ.");
  }finally{
    generating = false;
    $("genBtn").classList.remove("busy");
    $("genLabel").textContent = "Générer la boucle";
    $("rerollBtn").disabled = !currentRoute;
  }
}

function displayRoute(route, start){
  if (routeLayer) map.removeLayer(routeLayer);
  const geojson = { type:"Feature", properties:{}, geometry: route.geometry };
  routeLayer = L.geoJSON(geojson, {
    style:{ color:"#E8490F", weight:5, opacity:.92, lineCap:"round", lineJoin:"round" }
  }).addTo(map);
  decorateRoute(route.geometry.coordinates);
  map.fitBounds(routeLayer.getBounds(), { padding:[40, 40], paddingBottomRight:[40, 220] });

  currentRoute = { geojson, distance: route.distance, gain: null, elev: null, start,
                   name: "Boucle " + (route.distance/1000).toFixed(1) + " km",
                   recentId: Date.now() };
  $("stats").classList.add("on");
  $("statDist").innerHTML = fmtDist(route.distance).replace(/(km|mi)$/, "<small>$1</small>");
  $("statElev").textContent = "…";
  $("elevChart").hidden = true;
  updateTime();
  $("saveBtn").disabled = false;
  $("rerollBtn").disabled = false;
  $("gpxBtn").disabled = false;
  $("shareBtn").hidden = false;

  pushRecent({
    id: currentRoute.recentId, name: currentRoute.name, distance: currentRoute.distance,
    start, geojson, gain: null, elev: null
  });

  // Indicateur de propreté de la boucle
  const ov = overlapRatio(route.geometry.coordinates);
  const q = $("quality");
  q.hidden = false;
  q.textContent = ov <= 0.04
    ? "Boucle propre — quasi aucun passage doublé"
    : `Tracé doublé sur ~${Math.round(ov*100)} % — touchez ⟳ pour tenter mieux`;

  fetchElevation(route.geometry.coordinates)
    .then(res => {
      currentRoute.gain = res.gain;
      currentRoute.elev = res;
      $("statElev").innerHTML = fmtElevGain(res.gain).replace(/(m|ft)$/, "<small>$1</small>");
      drawElevChart(route.geometry.coordinates, res);
      colorizeSlopeOverlay(route.geometry.coordinates, res);
      updateRecentElev(currentRoute.recentId, res.gain, res);

      // Alerte si le dénivelé est nettement plus important que la moyenne
      const perKm = res.gain / (route.distance/1000);
      $("statElev").classList.toggle("warn", perKm >= 25);
      if (perKm >= 25)
        toast(`⚠ Dénivelé conséquent : ${Math.round(res.gain)} m sur ${(route.distance/1000).toFixed(1)} km (~${Math.round(perKm)} m/km)`);
    })
    .catch(() => { $("statElev").textContent = "n/d"; });
}

/* ---- partage : lien Google Maps (mode piéton) construit à partir d'un
   échantillon de points du tracé, via l'API de partage native si dispo ---- */
function buildMapsShareLink(coords){
  const maxPts = 20;
  const step = Math.max(1, Math.floor(coords.length / maxPts));
  const pts = [];
  for (let i=0; i<coords.length; i+=step) pts.push(coords[i]);
  if (pts[pts.length-1] !== coords[coords.length-1]) pts.push(coords[coords.length-1]);
  const path = pts.map(c => `${c[1].toFixed(5)},${c[0].toFixed(5)}`).join("/");
  return `https://www.google.com/maps/dir/${path}/data=!4m2!4m1!3e2`;
}
$("shareBtn").addEventListener("click", async () => {
  if (!currentRoute) return;
  const url = buildMapsShareLink(currentRoute.geojson.geometry.coordinates);
  const text = `Ma boucle de course : ${(currentRoute.distance/1000).toFixed(1)} km`;
  if (navigator.share){
    try{ await navigator.share({ title:"Boucle", text, url }); }catch{ /* annulé par l'utilisateur */ }
  } else {
    try{ await navigator.clipboard.writeText(url); toast("Lien Google Maps copié dans le presse-papiers"); }
    catch{ window.open(url, "_blank"); }
  }
});

/* ---- profil altimétrique (SVG) ---- */
function drawElevChart(lineCoords, res){
  const xs = [0]; let acc = 0;
  for (let k=1; k<res.idx.length; k++){
    for (let i=res.idx[k-1]+1; i<=res.idx[k]; i++)
      acc += haversine([lineCoords[i-1][1],lineCoords[i-1][0]], [lineCoords[i][1],lineCoords[i][0]]);
    xs.push(acc);
  }
  if (acc <= 0) return;
  const W = 560, H = 60, P = 4;
  const min = Math.min(...res.ele), max = Math.max(...res.ele);
  const span = Math.max(10, max - min);          // au moins 10 m d'amplitude visuelle
  const X = d => P + (W - 2*P) * d / acc;
  const Y = e => H - P - (H - 2*P) * (e - min) / span;
  let path = `M${X(0).toFixed(1)},${Y(res.ele[0]).toFixed(1)}`;
  for (let k=1; k<res.ele.length; k++) path += ` L${X(xs[k]).toFixed(1)},${Y(res.ele[k]).toFixed(1)}`;
  const area = path + ` L${X(acc).toFixed(1)},${H-P} L${X(0).toFixed(1)},${H-P} Z`;
  $("elevChart").innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-label="Profil altimétrique">` +
    `<path d="${area}" fill="rgba(232,73,15,.13)"/>` +
    `<path d="${path}" fill="none" stroke="#E8490F" stroke-width="2"/></svg>` +
    `<div class="elev-labels"><span>min ${Math.round(min)} m</span><span>max ${Math.round(max)} m</span></div>`;
  $("elevChart").hidden = false;
}

/* ---- dénivelé : Open-Elevation, repli Open-Meteo (sans clé, très stable) ---- */
async function fetchElevation(lineCoords){
  const step = Math.max(1, Math.floor(lineCoords.length / 60));
  const idx = [];
  for (let i=0; i<lineCoords.length; i+=step) idx.push(i);
  if (idx[idx.length-1] !== lineCoords.length-1) idx.push(lineCoords.length-1);
  const pts = idx.map(i => lineCoords[i]);

  let el = null;
  try{
    const r = await fetch(ELEVATION, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ locations: pts.map(c => ({ latitude:c[1], longitude:c[0] })) })
    });
    if (r.ok){
      const j = await r.json();
      if (j.results && j.results.length) el = j.results.map(p => p.elevation);
    }
  }catch{}

  if (!el){
    const lats = pts.map(c => c[1].toFixed(5)).join(",");
    const lngs = pts.map(c => c[0].toFixed(5)).join(",");
    const r = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`);
    if (!r.ok) throw new Error("elevation");
    const j = await r.json();
    el = j.elevation;
  }
  if (!el || !el.length) throw new Error("elevation");

  let gain = 0;
  for (let i=1; i<el.length; i++){
    const d = el[i]-el[i-1];
    if (d > 1) gain += d;      // seuil 1 m pour lisser le bruit
  }
  return { gain, idx, ele: el };
}

/* ---- temps estimé selon l'allure (min + sec séparés) ---- */
function clampPaceFields(){
  let mn = parseInt($("paceMin").value, 10);
  let sc = parseInt($("paceSec").value, 10);
  if (isNaN(mn) || mn < 2)  mn = 2;
  if (mn > 20) mn = 20;
  if (isNaN(sc) || sc < 0) sc = 0;
  if (sc > 59) sc = 59;
  $("paceMin").value = mn;
  $("paceSec").value = sc;
  return mn + sc/60;
}
function updateTime(){
  if (!currentRoute) return;
  const pace = clampPaceFields();
  const totalMin = (currentRoute.distance/1000) * pace;
  const h = Math.floor(totalMin/60), mn = Math.round(totalMin%60);
  $("statTime").innerHTML = h > 0
    ? `${h}<small>h</small>${String(mn).padStart(2,"0")}`
    : `${mn} <small>min</small>`;
  savePrefs();
}
$("paceMin").addEventListener("change", updateTime);
$("paceSec").addEventListener("change", updateTime);
$("distInput").addEventListener("change", savePrefs);

function savePrefs(){
  try{ localStorage.setItem(LS_PREFS, JSON.stringify({
    dist:$("distInput").value, paceMin:$("paceMin").value, paceSec:$("paceSec").value,
    mode:runMode, markerInt:markerIntervalM, night:nightOverride, quiet:quietStreets, unit:unitSystem,
    compact: $("sheet").classList.contains("compact")
  })); }catch{}
}
(function loadPrefs(){
  try{
    const p = JSON.parse(localStorage.getItem(LS_PREFS) || "null");
    if (p){
      $("distInput").value = p.dist || "8";
      $("paceMin").value = p.paceMin ?? (p.pace ? p.pace.split(":")[0] : "5");
      $("paceSec").value = p.paceSec ?? (p.pace ? p.pace.split(":")[1] : "30");
      if (p.mode){
        runMode = p.mode;
        document.querySelectorAll(".mode").forEach(x => x.classList.toggle("on", x.dataset.mode === runMode));
      }
      if (p.markerInt){
        markerIntervalM = p.markerInt;
        document.querySelectorAll(".mi").forEach(x => x.classList.toggle("on", parseInt(x.dataset.int,10) === markerIntervalM));
      }
      if (p.night !== undefined) nightOverride = p.night;
      if (p.quiet){ quietStreets = true; $("quietBtn").classList.add("on"); }
      if (p.unit === "mi"){ unitSystem = "mi"; applyUnit(); }
      if (p.compact){ $("sheet").classList.add("compact"); $("compactBtn").classList.add("on"); }
    }
  }catch{}
})();

$("genBtn").addEventListener("click", () => generateLoop(false));

/* ================= Export GPX (Zepp / Amazfit T-Rex 2) ================= */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---- interpolateur d'altitude : elev={idx,ele} (échantillons épars) → fonction(i) qui
   donne l'altitude estimée à l'indice i de coordonnée du tracé complet ---- */
function makeElevInterpolator(elev){
  if (!elev || !elev.idx || !elev.ele || elev.idx.length !== elev.ele.length) return null;
  const { idx, ele } = elev;
  return i => {
    let k = 0;
    while (k < idx.length-1 && idx[k+1] < i) k++;
    if (k >= idx.length-1 || idx[k] >= i) return ele[Math.min(k, ele.length-1)];
    const t = (i - idx[k]) / (idx[k+1] - idx[k]);
    return ele[k] + (ele[k+1] - ele[k]) * t;
  };
}

/* ---- survol coloré des montées sur le tracé : segments plats/descente restent
   sous l'orange de base, les montées se colorent en rouge plus soutenu selon la pente ---- */
let slopeLayer = null;
function colorizeSlopeOverlay(lineCoords, elev){
  if (slopeLayer){ map.removeLayer(slopeLayer); slopeLayer = null; }
  const eleAt = makeElevInterpolator(elev);
  if (!eleAt) return;
  const group = L.layerGroup();
  for (let i=1; i<lineCoords.length; i++){
    const a = lineCoords[i-1], b = lineCoords[i];
    const distM = haversine([a[1],a[0]], [b[1],b[0]]);
    if (distM < 1) continue;
    const slopePct = (eleAt(i) - eleAt(i-1)) / distM * 100;
    if (slopePct < 3) continue;   // plat ou descente : on laisse l'orange de base visible
    const color = slopePct >= 6 ? "#7A1D0A" : "#C43D0F";
    L.polyline([[a[1],a[0]], [b[1],b[0]]], { color, weight:5, opacity:.95, lineCap:"round", lineJoin:"round" }).addTo(group);
  }
  slopeLayer = group.addTo(map);
}

function toGPX(geojson, name, elev){
  const coords = geojson.geometry.coordinates;
  const eleAt = makeElevInterpolator(elev);
  const pts = coords
    .map((c,i) => `      <trkpt lat="${c[1].toFixed(6)}" lon="${c[0].toFixed(6)}">` +
                  (eleAt ? `<ele>${eleAt(i).toFixed(1)}</ele>` : "") + `</trkpt>`)
    .join("\n");
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Boucle" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata><name>${esc(name)}</name><time>${new Date().toISOString()}</time></metadata>
  <trk>
    <name>${esc(name)}</name>
    <trkseg>
${pts}
    </trkseg>
  </trk>
</gpx>`;
}

function downloadGPX(geojson, name, elev){
  const file = name.toLowerCase().replace(/[^a-z0-9à-ÿ]+/gi,"-").replace(/^-|-$/g,"") || "boucle";
  const blob = new Blob([toGPX(geojson, name, elev)], { type:"application/gpx+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = file + ".gpx";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  toast("GPX exporté — ouvrez-le avec l'app Zepp");
}

$("gpxBtn").addEventListener("click", () => {
  if (currentRoute) downloadGPX(currentRoute.geojson, currentRoute.name || "Boucle", currentRoute.elev);
});

/* ================= Favoris (LocalStorage) ================= */
function getFavs(){ try{ return JSON.parse(localStorage.getItem(LS_FAVS) || "[]"); }catch{ return []; } }
function setFavs(v){
  try{ localStorage.setItem(LS_FAVS, JSON.stringify(v)); }
  catch{ toast("Stockage plein : supprimez d'anciens favoris"); }
}

$("saveBtn").addEventListener("click", () => {
  if (!currentRoute) return;
  const km = (currentRoute.distance/1000).toFixed(1);
  const favs = getFavs();
  const dup = favs.find(f =>
    haversine(f.start, currentRoute.start) < 150 &&
    Math.abs(f.distance - currentRoute.distance) / currentRoute.distance < 0.10
  );
  if (dup){
    const go = confirm(
      `Un parcours similaire existe déjà : « ${dup.name} » (${(dup.distance/1000).toFixed(1)} km, même départ à peu près).\n\nL'ajouter quand même ?`
    );
    if (!go) return;
  }
  const name = prompt("Nom du parcours :", `Boucle ${km} km`);
  if (name === null) return;
  favs.unshift({
    id: Date.now(),
    name: name.trim() || `Boucle ${km} km`,
    date: new Date().toISOString().slice(0,10),
    distance: currentRoute.distance,
    gain: currentRoute.gain,
    elev: currentRoute.elev,
    start: currentRoute.start,
    geojson: currentRoute.geojson,
    target: parseFloat($("distInput").value) || null,
    mode: runMode,
    vias: viaMarkers.map(m => { const p = m.getLatLng(); return [p.lat, p.lng]; }),
    runs: []   // historique : dates auxquelles cette boucle a été marquée comme courue
  });
  setFavs(favs);
  toast("Parcours ajouté aux favoris ★");
  renderFavs();
});

function fmtRunInfo(f){
  const n = (f.runs || []).length;
  if (!n) return "";
  const last = f.runs[n-1];
  return ` · couru ${n}× (dernière le ${last})`;
}

function renderFavs(){
  const favs = getFavs();
  const list = $("favList");
  list.innerHTML = "";
  if (!favs.length){
    list.innerHTML = '<div class="empty">Aucun parcours enregistré.<br>Générez une boucle puis touchez ★.</div>';
  }
  for (const f of favs){
    const row = document.createElement("div");
    row.className = "fav";
    const gain = (f.gain != null) ? ` · ${fmtElevGain(f.gain)} D+` : "";
    row.innerHTML = `
      <div class="fav-info">
        <b title="Toucher pour renommer"></b>
        <span>${fmtDist(f.distance)}${gain} · ${f.date}${fmtRunInfo(f)}</span>
      </div>
      <button class="load">Charger</button>
      <button class="load gpx">GPX</button>
      <button class="load var" title="Recréer une variante avec les mêmes réglages">⟳ Variante</button>
      <button class="run-btn" title="Marquer comme couru aujourd'hui">✓ Couru</button>
      <button class="del" aria-label="Supprimer">✕</button>`;
    row.querySelector("b").textContent = f.name;
    row.querySelector("b").addEventListener("click", () => {
      const nn = prompt("Renommer le parcours :", f.name);
      if (nn === null) return;
      const all = getFavs();
      const it = all.find(x => x.id === f.id);
      if (it){ it.name = nn.trim() || it.name; setFavs(all); renderFavs(); }
    });
    row.querySelector(".load:not(.gpx):not(.var)").addEventListener("click", () => loadFav(f));
    row.querySelector(".gpx").addEventListener("click", () => downloadGPX(f.geojson, f.name, f.elev));
    row.querySelector(".var").addEventListener("click", () => {
      closeFavs();
      if (f.target) $("distInput").value = f.target;
      if (f.mode){
        runMode = f.mode;
        document.querySelectorAll(".mode").forEach(x => x.classList.toggle("on", x.dataset.mode === runMode));
      }
      viaMarkers.forEach(m => map.removeLayer(m));
      viaMarkers = [];
      (f.vias || []).forEach(v => addVia(v[0], v[1]));
      setStart(f.start[0], f.start[1], true);
      generateLoop();
    });
    row.querySelector(".run-btn").addEventListener("click", () => {
      const all = getFavs();
      const it = all.find(x => x.id === f.id);
      if (!it) return;
      const today = new Date().toISOString().slice(0,10);
      it.runs = it.runs || [];
      it.runs.push(today);
      setFavs(all);
      toast(`Ajouté à l'historique — ${(f.distance/1000).toFixed(1)} km`);
      renderFavs();
    });
    row.querySelector(".del").addEventListener("click", () => {
      if (!confirm(`Supprimer « ${f.name} » ?`)) return;
      setFavs(getFavs().filter(x => x.id !== f.id));
      renderFavs();
    });
    list.appendChild(row);
  }
  renderRunSummary(favs);
  renderRecent();
}

/* ---- résumé km courus (7 et 30 derniers jours), calculé à partir des
   historiques "runs" de tous les favoris ---- */
function renderRunSummary(favs){
  const el = $("runSummary");
  const now = Date.now(), DAY = 86400000;
  let m7 = 0, m30 = 0, hasAny = false;
  const weeksM = [0, 0, 0, 0];   // en mètres : [semaine en cours .. il y a 3 semaines]
  for (const f of favs){
    for (const d of (f.runs || [])){
      const t = new Date(d + "T12:00:00").getTime();
      if (isNaN(t)) continue;
      hasAny = true;
      const ageDays = (now - t) / DAY;
      if (ageDays <= 30) m30 += f.distance;
      if (ageDays <= 7)  m7  += f.distance;
      const w = Math.floor(ageDays / 7);
      if (w >= 0 && w < 4) weeksM[w] += f.distance;
    }
  }
  if (!hasAny){ el.hidden = true; $("weekChart").hidden = true; return; }
  const unitLabel = unitSystem === "mi" ? "mi" : "km";
  const conv = m => unitSystem === "mi" ? m / 1609.344 : m / 1000;
  el.hidden = false;
  el.innerHTML = `
    <div class="rs"><b>${conv(m7).toFixed(1)}</b><span>${unitLabel} · 7 derniers jours</span></div>
    <div class="rs"><b>${conv(m30).toFixed(1)}</b><span>${unitLabel} · 30 derniers jours</span></div>`;

  // Graphique des 4 dernières semaines (barres, la plus récente à droite)
  const wc = $("weekChart");
  const ordered = [weeksM[3], weeksM[2], weeksM[1], weeksM[0]].map(conv);
  const labels = ["-3 sem.", "-2 sem.", "-1 sem.", "Cette sem."];
  const max = Math.max(1, ...ordered);
  wc.hidden = false;
  wc.innerHTML = `<div class="wc-bars">` + ordered.map((v,i) => `
    <div class="wc-col">
      <span class="wc-val">${v > 0 ? v.toFixed(1) : ""}</span>
      <div class="wc-bar" style="height:${Math.max(3, v/max*100)}%"></div>
      <span class="wc-lbl">${labels[i]}</span>
    </div>`).join("") + `</div>`;
}

/* ---- export groupé : un seul fichier GPX contenant une trace par favori.
   Valide en GPX (plusieurs <trk> par fichier), mais certaines montres/apps
   n'importent que la première trace d'un fichier multi-traces — à vérifier
   selon votre matériel. ---- */
$("exportAllBtn").addEventListener("click", () => {
  const favs = getFavs();
  if (!favs.length) return toast("Aucun favori à exporter");
  const tracks = favs.map(f => {
    const eleAt = makeElevInterpolator(f.elev);
    const pts = f.geojson.geometry.coordinates
      .map((c,i) => `      <trkpt lat="${c[1].toFixed(6)}" lon="${c[0].toFixed(6)}">` +
                    (eleAt ? `<ele>${eleAt(i).toFixed(1)}</ele>` : "") + `</trkpt>`)
      .join("\n");
    return `  <trk>\n    <name>${esc(f.name)}</name>\n    <trkseg>\n${pts}\n    </trkseg>\n  </trk>`;
  }).join("\n");
  const gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Boucle" xmlns="http://www.topografix.com/GPX/1/1">\n  <metadata><name>Mes parcours</name><time>${new Date().toISOString()}</time></metadata>\n${tracks}\n</gpx>`;
  const blob = new Blob([gpx], { type:"application/gpx+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "mes-parcours.gpx";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  toast(`${favs.length} parcours exportés dans un seul fichier GPX`);
});

function loadFav(f, alreadySaved){
  if (alreadySaved === undefined) alreadySaved = true;
  closeFavs();
  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.geoJSON(f.geojson, {
    style:{ color:"#E8490F", weight:5, opacity:.92, lineCap:"round", lineJoin:"round" }
  }).addTo(map);
  decorateRoute(f.geojson.geometry.coordinates);
  map.fitBounds(routeLayer.getBounds(), { padding:[40,40], paddingBottomRight:[40,220] });
  setStart(f.start[0], f.start[1], false);
  currentRoute = { geojson:f.geojson, distance:f.distance, gain:f.gain, elev:f.elev || null, start:f.start, name:f.name };
  $("stats").classList.add("on");
  $("statDist").innerHTML = fmtDist(f.distance).replace(/(km|mi)$/, "<small>$1</small>");
  $("statElev").innerHTML = (f.gain != null) ? fmtElevGain(f.gain).replace(/(m|ft)$/, "<small>$1</small>") : "n/d";
  if (f.elev && f.elev.idx){ drawElevChart(f.geojson.geometry.coordinates, f.elev); colorizeSlopeOverlay(f.geojson.geometry.coordinates, f.elev); }
  else { $("elevChart").hidden = true; if (slopeLayer){ map.removeLayer(slopeLayer); slopeLayer = null; } }
  const ov = overlapRatio(f.geojson.geometry.coordinates);
  $("quality").hidden = false;
  $("quality").textContent = ov <= 0.04
    ? "Boucle propre — quasi aucun passage doublé"
    : `Tracé doublé sur ~${Math.round(ov*100)} %`;
  updateTime();
  $("saveBtn").disabled = alreadySaved;      // déjà enregistré si chargé depuis les favoris
  $("rerollBtn").disabled = false;
  $("gpxBtn").disabled = false;
  $("shareBtn").hidden = false;
  if (f.gain != null){
    const perKm = f.gain / (f.distance/1000);
    $("statElev").classList.toggle("warn", perKm >= 25);
  }
}

const favPanel = $("favPanel");
function closeFavs(){ favPanel.classList.remove("open"); }
$("favOpenBtn").addEventListener("click", () => { renderFavs(); favPanel.classList.add("open"); });
$("favCloseBtn").addEventListener("click", closeFavs);

/* ================= Panneau repliable ================= */
$("collapseBtn").addEventListener("click", () => $("sheet").classList.toggle("folded"));

$("compactBtn").addEventListener("click", () => {
  const on = $("sheet").classList.toggle("compact");
  $("compactBtn").classList.toggle("on", on);
  savePrefs();
});

/* ---- glisser la poignée pour replier/déplier le panneau, au doigt comme
   à la souris (Pointer Events unifie les deux). Suivi progressif du doigt
   pendant le geste, puis accroche (snap) sur l'état ouvert ou replié. ---- */
(function enableSheetDrag(){
  const sheet = $("sheet"), handle = $("grab");
  let dragging = false, startY = 0, startTranslate = 0, sheetH = 0;

  function foldedOffset(){ return Math.max(0, sheetH - 58); }
  function currentTranslate(){ return sheet.classList.contains("folded") ? foldedOffset() : 0; }

  function onDown(e){
    dragging = true;
    sheetH = sheet.offsetHeight;
    startY = e.clientY;
    startTranslate = currentTranslate();
    sheet.style.transition = "none";
    if (handle.setPointerCapture) handle.setPointerCapture(e.pointerId);
  }
  function onMove(e){
    if (!dragging) return;
    const dy = Math.max(0, Math.min(foldedOffset(), startTranslate + (e.clientY - startY)));
    sheet.style.transform = `translateY(${dy}px)`;
  }
  function onUp(e){
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = "";
    // Un simple tap (sans déplacement réel) ne fait plus rien : il faut
    // maintenir puis glisser pour replier/déplier. Le bouton ▾ reste
    // disponible pour un basculement en un tap si besoin.
    const dy = Math.max(0, Math.min(foldedOffset(), startTranslate + (e.clientY - startY)));
    sheet.style.transform = "";
    sheet.classList.toggle("folded", dy > foldedOffset() * 0.35);
  }
  handle.addEventListener("pointerdown", onDown);
  window.addEventListener("pointermove", onMove);
  window.addEventListener("pointerup", onUp);
  window.addEventListener("pointercancel", onUp);
})();

/* ================= Réinitialiser la carte ================= */
function resetMap(){
  if (!confirm("Réinitialiser la carte ? Le départ, la boucle et les passages en cours seront effacés (vos favoris et Maison sont conservés).")) return;

  if (routeLayer)  { map.removeLayer(routeLayer);  routeLayer  = null; }
  if (decorLayer)  { map.removeLayer(decorLayer);  decorLayer  = null; }
  if (slopeLayer)  { map.removeLayer(slopeLayer);  slopeLayer  = null; }
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (meMarker)    { map.removeLayer(meMarker);    meMarker    = null; }
  viaMarkers.forEach(m => map.removeLayer(m));
  viaMarkers = [];
  viaMode = false;
  $("viaBtn").classList.remove("on");
  refreshVias();

  currentRoute = null;
  usedFallbackRouter = false;
  $("stats").classList.remove("on");
  $("statDist").textContent = "–";
  $("statElev").textContent = "–";
  $("statTime").textContent = "–";
  $("elevChart").hidden = true;
  $("quality").hidden = true;
  $("saveBtn").disabled = true;
  $("rerollBtn").disabled = true;
  $("gpxBtn").disabled = true;
  $("shareBtn").hidden = true;
  $("startHint").textContent = "Touchez la carte pour placer le départ";
  $("searchInput").value = "";
  $("searchResults").classList.remove("open");
  $("sheet").classList.remove("folded");

  runMode = "mix";
  document.querySelectorAll(".mode").forEach(x => x.classList.toggle("on", x.dataset.mode === "mix"));

  map.setView([46.6, 2.4], 6);   // France entière, comme au premier lancement
  toast("Carte réinitialisée");
}
$("resetBtn").addEventListener("click", resetMap);

// le bouton ◎ recentre sur la position quand on le demande.
renderFavs();
